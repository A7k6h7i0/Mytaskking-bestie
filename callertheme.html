<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futuristic Wave Mesh Profile Card</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* --- 0. Reset & Base Setup --- */
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
  }
  
  body {
    background-color: #03050a; 
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* --- 1. The Main Container --- */
  .card {
    width: 350px;
    height: 550px;
    background-color: #03060c; /* Darkened slightly to make the glow pop more */
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 25px 70px rgba(0, 0, 0, 0.95), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
  }

  /* --- 2. The Background Animation & Extreme Glow --- */
  .mesh-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
    mix-blend-mode: screen; /* Forces all light to behave additively */
  }

  /* Intense ambient glows acting as the "spill" from the neon net */
  .ambient-glow {
    position: absolute;
    width: 100%;
    height: 100%;
    background: 
      radial-gradient(circle at -5% 50%, rgba(255, 0, 234, 0.25) 0%, transparent 60%),
      radial-gradient(circle at 105% 50%, rgba(0, 242, 255, 0.3) 0%, transparent 60%);
    z-index: 2;
  }

  /* SVG Net styling */
  .svg-net {
    position: absolute;
    top: -10%;
    left: -10%;
    width: 120%;
    height: 120%;
    z-index: 3;
  }

  /* LEFT SIDE NET: Ultra-Density Pink Matrix */
  .net-left-lines {
    stroke: url(#pink-grad);
    stroke-width: 1.2px;
    fill: none;
    opacity: 1; 
    /* Double-stacked drop shadow creates a "hot core" and a wide light spill */
    filter: drop-shadow(0 0 4px #ff00ea) drop-shadow(0 0 12px #ff00ea); 
    transform-origin: 30% 50%;
    animation: waveFlowLeft 7s ease-in-out infinite alternate;
  }

  /* RIGHT SIDE NET: Ultra-Density Cyan Matrix */
  .net-right-lines {
    stroke: url(#cyan-grad);
    stroke-width: 1.2px;
    fill: none;
    opacity: 1; 
    /* Double-stacked drop shadow creates a "hot core" and a wide light spill */
    filter: drop-shadow(0 0 4px #00f2ff) drop-shadow(0 0 12px #00f2ff); 
    transform-origin: 70% 50%;
    animation: waveFlowRight 8s ease-in-out infinite alternate;
  }

  /* Vignette overlay keeps center legible */
  .vignette {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 45%, transparent 5%, #03060c 95%);
    z-index: 5;
  }

  @keyframes waveFlowLeft {
    0% { transform: scale(1) translate(0px, 0px) rotate(0deg); }
    50% { transform: scale(1.05) translate(-15px, 8px) rotate(-1deg); }
    100% { transform: scale(0.97) translate(-25px, -5px) rotate(-2deg); }
  }

  @keyframes waveFlowRight {
    0% { transform: scale(0.97) translate(0px, 0px) rotate(0deg); }
    50% { transform: scale(1.05) translate(15px, -8px) rotate(2deg); }
    100% { transform: scale(1.02) translate(30px, 5px) rotate(1deg); }
  }

  /* --- 3. The Profile Avatar & Glowing Ring --- */
  .avatar-wrapper {
    position: relative;
    z-index: 10;
    margin-top: 110px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00f2ff 0%, #ff00ea 100%);
    padding: 3px; 
    box-shadow: 
      0 0 20px rgba(0, 242, 255, 0.6), 
      0 0 50px rgba(255, 0, 234, 0.4);
  }

  .avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid #03060c; 
  }

  /* --- 4. The Interactive Badge (Call Button) --- */
  .call-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 46px;
    height: 46px;
    background-color: #12d15e;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 4px solid #03060c;
    z-index: 15;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(18, 209, 94, 0.8);
    animation: pulseCall 2s infinite;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  
  .call-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(18, 209, 94, 1);
  }

  .call-btn svg {
    width: 18px;
    height: 18px;
    fill: white;
  }

  @keyframes pulseCall {
    0% { box-shadow: 0 0 0 0 rgba(18, 209, 94, 0.8); }
    70% { box-shadow: 0 0 0 15px rgba(18, 209, 94, 0); }
    100% { box-shadow: 0 0 0 0 rgba(18, 209, 94, 0); }
  }

  /* --- 5. Typography & Details --- */
  .info-container {
    position: relative;
    z-index: 10;
    text-align: center;
    margin-top: 35px;
    width: 100%;
    padding: 0 20px;
  }

  .name {
    color: #ffffff;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); /* Adds a slight screen glow to the text */
  }

  .title {
    color: #c7d2eb;
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .location {
    color: #76839e;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.5px;
  }
</style>
