version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bestie
      POSTGRES_PASSWORD: bestie
      POSTGRES_DB: bestie
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: ../backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
