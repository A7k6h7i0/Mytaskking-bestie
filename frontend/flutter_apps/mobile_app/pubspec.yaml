name: mytaskking_mobile
description: MyTaskKing — Android + iOS mobile workspace.
version: 1.0.0+8
publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  mytaskking_design:
    path: ../shared_design_system
  mytaskking_core:
    path: ../shared_core

  go_router: ^14.6.1
  flutter_riverpod: ^2.6.1
  agora_rtc_engine: ^6.5.0
  permission_handler: ^11.3.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.4
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  dio: ^5.7.0
  record: ^5.2.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  emoji_picker_flutter: ^4.0.0
  # Plays the device's default ringtone for the incoming-call overlay so
  # the call rings the way users expect (vs a generic synth tone).
  flutter_ringtone_player: ^4.0.0+3
  # On-device speech recognition for the composer's "dictate" mic button.
  speech_to_text: ^7.0.0

dependency_overrides:
  # record 5.x's federated linux implementation has a platform-interface
  # mismatch that fails compile even on Android. Pin record_linux to the
  # version whose signatures match record_platform_interface 1.0.x.
  record_linux: 0.7.0
  record_platform_interface: 1.0.1
  record_android: ^1.2.0
  record_darwin: ^1.0.4

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
