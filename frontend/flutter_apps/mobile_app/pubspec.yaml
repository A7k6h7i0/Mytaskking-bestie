name: bestie_mobile
description: Bestie — Android + iOS mobile workspace.
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  bestie_design:
    path: ../shared_design_system
  bestie_core:
    path: ../shared_core

  go_router: ^14.6.1
  flutter_riverpod: ^2.6.1
  agora_rtc_engine: ^6.5.0
  permission_handler: ^11.3.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
