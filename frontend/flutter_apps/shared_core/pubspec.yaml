name: mytaskking_core
description: Shared API client, models, and auth state for all MyTaskKing Flutter apps.
version: 1.0.0
publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  mytaskking_design:
    path: ../shared_design_system
  go_router: ^14.6.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  socket_io_client: ^3.0.0
  json_annotation: ^4.9.0
  flutter_riverpod: ^2.6.1

dev_dependencies:
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
