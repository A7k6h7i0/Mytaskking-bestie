name: mytaskking_windows
description: MyTaskKing — Windows desktop workspace.
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  mytaskking_design:
    path: ../shared_design_system
  mytaskking_core:
    path: ../shared_core
  mytaskking_mobile:
    path: ../mobile_app
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.1
  window_manager: ^0.4.3

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

# record's Linux federated package resolves to an old 0.7.2 that is
# API-incompatible with record_platform_interface 1.6.0 (compile error in the
# kernel snapshot, even on macOS/Windows where Linux code is unused). Pin the
# 1.x line which implements the current interface.
dependency_overrides:
  record_linux: ^1.0.0
